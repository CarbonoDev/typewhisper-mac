<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TypeWhisper Meet Bridge</title>
    <style>
      body {
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 24px;
        max-width: 560px;
        color: #1f2328;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #e6edf3; background: #0d1117; }
        input { color: #e6edf3; background: #161b22; border-color: #30363d; }
        .hint { color: #8b949e; }
      }
      h1 { font-size: 18px; margin: 0 0 4px; }
      .sub { color: #656d76; margin: 0 0 24px; }
      label { display: block; margin: 16px 0 4px; font-weight: 600; }
      input[type='text'], input[type='password'] {
        width: 100%; padding: 8px 10px; border: 1px solid #d0d7de;
        border-radius: 6px; box-sizing: border-box; font: inherit;
      }
      .row { display: flex; align-items: center; gap: 8px; margin-top: 20px; }
      .hint { color: #656d76; font-size: 12px; margin-top: 4px; }
      button {
        margin-top: 24px; padding: 8px 16px; border-radius: 6px;
        border: 1px solid #d0d7de; background: #f6f8fa; font: inherit; cursor: pointer;
      }
      #status { margin-left: 12px; font-size: 13px; }
      .ok { color: #1a7f37; }
      .bad { color: #cf222e; }
    </style>
  </head>
  <body>
    <h1>TypeWhisper Meet Bridge</h1>
    <p class="sub">Streams speaker-attributed Google Meet captions into the TypeWhisper meetings app.</p>

    <div class="row">
      <input type="checkbox" id="enabled" />
      <label for="enabled" style="margin: 0">Capture captions on Google Meet</label>
    </div>

    <label for="baseUrl">TypeWhisper local API</label>
    <input type="text" id="baseUrl" placeholder="http://127.0.0.1:8978" />
    <div class="hint">Must be a loopback address. Enable the local API in TypeWhisper → Settings.</div>

    <label for="apiToken">API token (optional)</label>
    <input type="password" id="apiToken" placeholder="leave blank if no token is set" />
    <div class="hint">Matches the token in TypeWhisper's local API settings.</div>

    <button id="save">Save</button>
    <button id="test">Test connection</button>
    <span id="status"></span>

    <script type="module" src="options.js"></script>
  </body>
</html>
